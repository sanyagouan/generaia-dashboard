<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeneraIA · CRM</title>
<style>
/* =====================================================
   GeneraIA CRM Dashboard — Single Page App
   Paleta: ámbar/dorado (#f59e0b, #d97706) sobre oscuro
   Tipografía: Space Grotesk (cargada inline via woff2)
   ===================================================== */

/* ── Space Grotesk (woff2) ─── */
@font-face {
  font-family: 'Space Grotesk';
  src: url('data:application/font-woff2;base64,') format('woff2');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('data:application/font-woff2;base64,') format('woff2');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('data:application/font-woff2;base64,') format('woff2');
  font-weight: 600;
  font-style: normal;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('data:application/font-woff2;base64,') format('woff2');
  font-weight: 700;
  font-style: normal;
}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

/* ── Reset & Variables ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0a0a0f;
  --bg-card: #12121a;
  --bg-card-hover: #1a1a26;
  --bg-elevated: #1e1e2e;
  --border: #2a2a3a;
  --border-light: #3a3a4a;
  --text-primary: #e2e8f0;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --amber: #f59e0b;
  --amber-dark: #d97706;
  --amber-light: #fbbf24;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #a855f7;
  --teal: #14b8a6;
  --red: #ef4444;
  --font: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.4), 0 4px 10px rgba(0,0,0,.2);
}
html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-card); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Layout ─── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 1.5rem 1rem;
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: 2.5rem;
  padding: 0 .5rem;
}
.sidebar-logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--amber), var(--amber-dark));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.1rem; color: #0a0a0f;
  flex-shrink: 0;
}
.sidebar-logo-text {
  font-weight: 700; font-size: 1.15rem;
  letter-spacing: -.02em;
}
.sidebar-logo-text span { color: var(--amber); }

.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: .25rem; }
.nav-item {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .65rem .75rem;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  text-decoration: none;
  font-weight: 500;
  font-size: .9rem;
  cursor: pointer;
  transition: all .15s ease;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font);
}
.nav-item:hover { background: var(--bg-elevated); color: var(--text-primary); }
.nav-item.active { background: rgba(245,158,11,.15); color: var(--amber); }
.nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }

.sidebar-footer {
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: .75rem;
  color: var(--text-muted);
  text-align: center;
}

/* ── Main ─── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg-primary);
}
.header h1 { font-size: 1.2rem; font-weight: 600; }
.header-actions { display: flex; align-items: center; gap: .75rem; }

.content {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
}

/* ── Cards ─── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}

/* ── Stats Grid ─── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
}
.stat-label {
  font-size: .8rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: .35rem;
}
.stat-value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--amber);
  line-height: 1.1;
}
.stat-sub {
  font-size: .8rem;
  color: var(--text-muted);
  margin-top: .25rem;
}
.stat-breakdown {
  display: flex;
  flex-wrap: wrap;
  gap: .75rem;
  margin-top: .5rem;
}
.stat-breakdown-item {
  display: flex;
  align-items: center;
  gap: .35rem;
  font-size: .8rem;
  color: var(--text-secondary);
}
.stat-breakdown-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

/* ── Button ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .5rem 1rem;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-weight: 600;
  font-size: .85rem;
  cursor: pointer;
  transition: all .15s ease;
  text-decoration: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--amber), var(--amber-dark));
  color: #0a0a0f;
}
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--bg-elevated); color: var(--text-primary); }
.btn-whatsapp {
  background: #25D366;
  color: #fff;
}
.btn-whatsapp:hover { filter: brightness(1.1); }
.btn-sm { padding: .35rem .65rem; font-size: .8rem; }
.btn-xs { padding: .25rem .5rem; font-size: .75rem; }

/* ── Table ─── */
.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.table-filters {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .5rem;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.table-filters .search-input {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: .45rem .75rem .45rem 2rem;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: .85rem;
  width: 200px;
  outline: none;
  transition: border .15s;
}
.table-filters .search-input:focus { border-color: var(--amber); }
.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute;
  left: .6rem; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--text-muted);
}

table {
  width: 100%;
  border-collapse: collapse;
}
thead th {
  padding: .75rem 1rem;
  text-align: left;
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
thead th:hover { color: var(--text-secondary); }
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg-card-hover); }
tbody td {
  padding: .7rem 1rem;
  font-size: .88rem;
  vertical-align: middle;
}

/* ── Badge / Status ─── */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .2rem .6rem;
  border-radius: 100px;
  font-size: .78rem;
  font-weight: 600;
  white-space: nowrap;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

/* ── Source badge ─── */
.source-badge {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  padding: .15rem .5rem;
  border-radius: 100px;
  font-size: .75rem;
  font-weight: 500;
  background: var(--bg-elevated);
  color: var(--text-secondary);
}
.source-badge.landing { color: var(--amber); }
.source-badge.whatsapp { color: var(--green); }

/* ── Tiempo transcurrido ─── */
.time-ago {
  font-size: .8rem;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ── Lead Detail Panel ─── */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 50;
  opacity: 0;
  visibility: hidden;
  transition: all .25s ease;
}
.detail-overlay.open { opacity: 1; visibility: visible; }
.detail-panel {
  position: fixed;
  top: 0; right: 0;
  width: 420px;
  max-width: 100vw;
  height: 100vh;
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  z-index: 51;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow: var(--shadow-lg);
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.detail-header h2 { font-size: 1.1rem; font-weight: 600; }
.detail-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: .3rem;
  border-radius: 4px;
  transition: color .15s;
}
.detail-close:hover { color: var(--text-primary); }
.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
}
.detail-field { margin-bottom: 1rem; }
.detail-field-label {
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-muted);
  margin-bottom: .2rem;
}
.detail-field-value { font-size: .9rem; color: var(--text-primary); }
.detail-actions {
  display: flex;
  gap: .5rem;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

/* ── Status changer ─── */
.status-selector {
  display: flex;
  flex-wrap: wrap;
  gap: .35rem;
  margin-top: .3rem;
}
.status-option {
  padding: .3rem .65rem;
  border-radius: 100px;
  font-size: .75rem;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--font);
  transition: all .15s;
}
.status-option:hover { border-color: var(--amber); color: var(--text-primary); }
.status-option.active { border-color: transparent; color: #0a0a0f; }

/* ── Notes section ─── */
.notes-area {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: .75rem;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: .85rem;
  width: 100%;
  min-height: 80px;
  resize: vertical;
  outline: none;
  transition: border .15s;
}
.notes-area:focus { border-color: var(--amber); }

/* ── Timeline ─── */
.timeline { position: relative; padding-left: 1.5rem; }
.timeline::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 4px;
  bottom: 0;
  width: 2px;
  background: var(--border);
}
.timeline-item {
  position: relative;
  padding-bottom: 1rem;
}
.timeline-item:last-child { padding-bottom: 0; }
.timeline-dot {
  position: absolute;
  left: -1.5rem;
  top: 3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-card);
  display: flex; align-items: center; justify-content: center;
}
.timeline-dot-inner {
  width: 6px; height: 6px;
  border-radius: 50%;
}
.timeline-date { font-size: .75rem; color: var(--text-muted); margin-bottom: .15rem; }
.timeline-text { font-size: .85rem; }

/* ── Toast notifications ─── */
.toast-container {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: .75rem 1rem;
  font-size: .85rem;
  color: var(--text-primary);
  box-shadow: var(--shadow-lg);
  animation: slideUp .3s ease;
  max-width: 360px;
}
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Empty state ─── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: .75rem; opacity: .5; }
.empty-state p { font-size: .9rem; }

/* ── Pagination ─── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .75rem 1.25rem;
  border-top: 1px solid var(--border);
  font-size: .85rem;
  color: var(--text-muted);
}
.pagination-pages {
  display: flex;
  gap: .25rem;
}

/* ── Loading shimmer ─── */
.shimmer-row {
  display: flex;
  gap: .75rem;
  padding: .7rem 1rem;
  border-bottom: 1px solid var(--border);
}
.shimmer-cell {
  height: 14px;
  background: linear-gradient(90deg, var(--bg-card-hover) 25%, var(--bg-elevated) 50%, var(--bg-card-hover) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 3px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Responsive ─── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .header { padding: .75rem 1rem; }
  .content { padding: 1rem; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .table-filters { flex-direction: column; align-items: stretch; }
  .table-filters .search-input { width: 100%; }
  .detail-panel { width: 100vw; }
  table { font-size: .8rem; }
  thead th, tbody td { padding: .5rem .6rem; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">G</div>
      <div class="sidebar-logo-text"><span>Genera</span>IA</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="resumen" onclick="switchView('resumen')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Resumen
      </button>
      <button class="nav-item" data-view="leads" onclick="switchView('leads')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Leads
      </button>
      <button class="nav-item" data-view="kanban" onclick="switchView('kanban')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        Pipeline
      </button>
    </nav>
    <div class="sidebar-footer">demo.generaia.org</div>
  </aside>

  <!-- Main area -->
  <div class="main">
    <header class="header">
      <h1 id="pageTitle">GeneraIA · CRM</h1>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="refreshData()" title="Actualizar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Sinc.
        </button>
        <span id="refreshStatus" style="font-size:.8rem;color:var(--text-muted)"></span>
      </div>
    </header>

    <div class="content" id="mainContent">
      <!-- Views are rendered here by JS -->
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <h2 id="detailTitle">Lead</h2>
    <button class="detail-close" onclick="closeDetail()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="detail-body" id="detailBody">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ==============================================================
   GeneraIA CRM — Vanilla JS App
   ============================================================== */

const API = '/rest/v1';

// ─── State ───
let state = {
  leads: [],
  currentView: 'resumen',
  currentPage: 1,
  perPage: 20,
  searchTerm: '',
  filterStatus: '',
  sortCol: 'created_at',
  sortDir: 'desc',
  selectedLead: null,
  loading: true,
  refreshInterval: null
};

// ─── Status mapping ───
const STATUS_MAP = {
  new:              { label: 'Nuevo',         color: '#f59e0b', bg: 'rgba(245,158,11,.15)' },
  contacted:        { label: 'Contactado',    color: '#3b82f6', bg: 'rgba(59,130,246,.15)' },
  trial_scheduled:  { label: 'Demo agendada', color: '#a855f7', bg: 'rgba(168,85,247,.15)' },
  trial_done:       { label: 'Demo hecha',    color: '#14b8a6', bg: 'rgba(20,184,166,.15)' },
  enrolled:         { label: 'Cerrado',       color: '#22c55e', bg: 'rgba(34,197,94,.15)' },
  lost:             { label: 'Perdido',       color: '#ef4444', bg: 'rgba(239,68,68,.15)' }
};
const STATUS_ORDER = ['new','contacted','trial_scheduled','trial_done','enrolled','lost'];
const STATUS_LABELS = { new:'Nuevo', contacted:'Contactado', trial_scheduled:'Demo agendada', trial_done:'Demo hecha', enrolled:'Cerrado', lost:'Perdido' };

// ─── Helpers ───
function $(id) { return document.getElementById(id); }
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function timeAgo(dateStr) {
  if (!dateStr) return '—';
  const now = Date.now();
  const d = new Date(dateStr).getTime();
  const diff = Math.max(0, now - d);
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Ahora';
  if (mins < 60) return `Hace ${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `Hace ${hrs}h`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `Hace ${days}d`;
  return new Date(dateStr).toLocaleDateString('es-ES', { day:'numeric', month:'short' });
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

function statusBadgeHTML(status) {
  const s = STATUS_MAP[status] || { label: status, color: '#9ca3af', bg: 'rgba(156,163,175,.1)' };
  return `<span class="status-badge" style="background:${s.bg};color:${s.color}"><span class="status-dot" style="background:${s.color}"></span>${esc(s.label)}</span>`;
}

function sourceBadgeHTML(source) {
  const isLanding = source === 'landing-chat' || source === 'landing';
  const label = isLanding ? 'Landing' : (source === 'whatsapp' ? 'WhatsApp' : esc(source || '—'));
  const cls = isLanding ? 'landing' : (source === 'whatsapp' ? 'whatsapp' : '');
  return `<span class="source-badge ${cls}">${label}</span>`;
}

function phoneLink(phone) {
  if (!phone) return '—';
  const cleaned = String(phone).replace(/[^0-9]/g, '');
  const display = cleaned.length >= 9 ? cleaned.slice(-9) : cleaned;
  const wa = cleaned.startsWith('34') ? cleaned : '34' + cleaned;
  return `<a href="https://wa.me/${wa}" target="_blank" rel="noopener" style="color:var(--amber);text-decoration:none;font-weight:500" title="Abrir WhatsApp">${display}</a>`;
}

function toast(msg, type = 'success') {
  const c = $('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ─── View Switching ───
function switchView(view) {
  state.currentView = view;
  state.currentPage = 1;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  $('pageTitle').textContent = view === 'resumen' ? 'GeneraIA · CRM — Resumen' : view === 'leads' ? 'GeneraIA · CRM — Leads' : 'GeneraIA · CRM — Pipeline';
  render();
}

// ─── API Calls ───
async function apiFetch(endpoint, opts = {}) {
  const url = API + endpoint;
  const headers = { 'Accept': 'application/json', 'Content-Type': 'application/json', ...opts.headers };
  try {
    const res = await fetch(url, { ...opts, headers });
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const j = await res.json(); msg = j.message || j.details || msg; } catch(e) {}
      throw new Error(msg);
    }
    if (opts.method === 'HEAD') return res;
    return await res.json();
  } catch(e) {
    console.error('API Error:', e);
    throw e;
  }
}

async function fetchLeads() {
  let endpoint = '/leads?order=created_at.desc';
  const filters = [];
  if (state.filterStatus) filters.push(`status=eq.${state.filterStatus}`);
  if (state.searchTerm) {
    const t = encodeURIComponent('%' + state.searchTerm + '%');
    filters.push(`or=(name.ilike.${t},phone.ilike.${t},email.ilike.${t},business_type.ilike.${t},source.ilike.${t},notes.ilike.${t})`);
  }
  if (filters.length) endpoint += '&' + filters.join('&');
  $('refreshStatus').textContent = 'Actualizando…';
  try {
    const data = await apiFetch(endpoint);
    state.leads = data || [];
    state.loading = false;
    $('refreshStatus').textContent = `✓ ${new Date().toLocaleTimeString('es-ES')}`;
    render();
  } catch(e) {
    state.loading = false;
    $('refreshStatus').textContent = '✗ Error';
    toast('Error al cargar leads: ' + e.message, 'error');
    render();
  }
}

async function patchLead(id, payload) {
  try {
    await apiFetch(`/leads?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(payload) });
    return true;
  } catch(e) {
    toast('Error al actualizar: ' + e.message, 'error');
    return false;
  }
}

async function changeStatus(leadId, newStatus) {
  if (!leadId) return;
  const ok = await patchLead(leadId, { status: newStatus });
  if (ok) {
    const lead = state.leads.find(l => l.id === leadId);
    if (lead) lead.status = newStatus;
    if (state.selectedLead && state.selectedLead.id === leadId) state.selectedLead.status = newStatus;
    render();
    toast(`Estado actualizado a «${STATUS_LABELS[newStatus] || newStatus}»`);
  }
}

async function saveNotes(leadId, notes) {
  if (!leadId) return;
  const ok = await patchLead(leadId, { notes });
  if (ok) {
    const lead = state.leads.find(l => l.id === leadId);
    if (lead) lead.notes = notes;
    if (state.selectedLead && state.selectedLead.id === leadId) state.selectedLead.notes = notes;
    toast('Notas guardadas');
  }
}

// ─── Detail Panel ───
function openDetail(lead) {
  if (!lead) return;
  state.selectedLead = { ...lead };
  renderDetail();
  $('detailOverlay').classList.add('open');
  $('detailPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  $('detailOverlay').classList.remove('open');
  $('detailPanel').classList.remove('open');
  document.body.style.overflow = '';
  state.selectedLead = null;
}

// ─── Render Views ───
function render() {
  if (state.currentView === 'resumen') return renderResumen();
  if (state.currentView === 'leads') return renderLeads();
  if (state.currentView === 'kanban') return renderKanban();
}

function renderResumen() {
  const leads = state.leads;
  const total = leads.length;
  const nuevos = leads.filter(l => l.status === 'new').length;
  const enSeguimiento = leads.filter(l => ['contacted','trial_scheduled','trial_done'].includes(l.status)).length;
  const cerrados = leads.filter(l => l.status === 'enrolled').length;
  const perdidos = leads.filter(l => l.status === 'lost').length;
  const landing = leads.filter(l => l.source === 'landing-chat' || l.source === 'landing').length;
  const whatsapp = leads.filter(l => l.source === 'whatsapp').length;

  let statsHTML = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total leads</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Nuevos</div><div class="stat-value" style="color:${STATUS_MAP.new.color}">${nuevos}</div></div>
    <div class="stat-card"><div class="stat-label">En seguimiento</div><div class="stat-value" style="color:${STATUS_MAP.trial_scheduled.color}">${enSeguimiento}</div></div>
    <div class="stat-card"><div class="stat-label">Cerrados</div><div class="stat-value" style="color:${STATUS_MAP.enrolled.color}">${cerrados}</div></div>
    <div class="stat-card"><div class="stat-label">Fuente</div>
      <div class="stat-breakdown">
        <div class="stat-breakdown-item"><span class="stat-breakdown-dot" style="background:var(--amber)"></span>Landing: ${landing}</div>
        <div class="stat-breakdown-item"><span class="stat-breakdown-dot" style="background:var(--green)"></span>WhatsApp: ${whatsapp}</div>
      </div>
    </div>
    <div class="stat-card"><div class="stat-label">Perdidos</div><div class="stat-value" style="color:${STATUS_MAP.lost.color}">${perdidos}</div></div>
  </div>`;

  // Lead list compact
  let tableHTML = `<div class="table-wrap"><div class="table-filters">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" placeholder="Buscar leads…" value="${esc(state.searchTerm)}" oninput="state.searchTerm=this.value;state.currentPage=1;renderResumen()">
    </div>
    <select style="background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.4rem .6rem;color:var(--text-primary);font-family:var(--font);font-size:.85rem;outline:none" onchange="state.filterStatus=this.value;state.currentPage=1;renderResumen()">
      <option value="">Todos los estados</option>
      ${STATUS_ORDER.map(s => `<option value="${s}"${state.filterStatus===s?' selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
    </select>
  </div>`;

  // Filter + paginate
  let filtered = [...leads];
  if (state.filterStatus) filtered = filtered.filter(l => l.status === state.filterStatus);
  if (state.searchTerm) {
    const t = state.searchTerm.toLowerCase();
    filtered = filtered.filter(l => (l.name||'').toLowerCase().includes(t) || (l.phone||'').toLowerCase().includes(t) || (l.email||'').toLowerCase().includes(t) || (l.business_type||'').toLowerCase().includes(t) || (l.source||'').toLowerCase().includes(t));
  }
  const totalFiltered = filtered.length;
  const totalPages = Math.max(1, Math.ceil(totalFiltered / state.perPage));
  if (state.currentPage > totalPages) state.currentPage = totalPages;
  const start = (state.currentPage - 1) * state.perPage;
  const pageLeads = filtered.slice(start, start + state.perPage);

  if (pageLeads.length === 0) {
    tableHTML += `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      <p>${state.searchTerm || state.filterStatus ? 'No hay leads que coincidan' : 'Aún no hay leads. ¡Conecta tu landing page!'}</p>

    tableHTML += `<div style="overflow-x:auto"><table>
      <thead><tr>

        <th onclick="sortLeads('business_type')">Negocio</th>
        <th onclick="sortLeads('source')">Fuente</th>
        <th onclick="sortLeads('status')">Estado</th>
        <th onclick="sortLeads('created_at')">Fecha ${sortIcon('created_at')}</th>
        <th>Tiempo</th>
        <th></th>
      </tr></thead><tbody>`;
    pageLeads.forEach(l => {
      const phoneClean = (l.phone||'').replace(/[^0-9]/g,'');
      const waNumber = phoneClean.startsWith('34') ? phoneClean : '34' + phoneClean;
      tableHTML += `<tr onclick="openDetail(${JSON.stringify(l).replace(/"/g,'&quot;')})" style="cursor:pointer">
        <td><strong>${esc(l.name)}</strong></td>
        <td>${phoneLink(l.phone)}</td>
        <td>${esc(l.business_type || '—')}</td>
        <td>${sourceBadgeHTML(l.source)}</td>
        <td>${statusBadgeHTML(l.status)}</td>
        <td style="white-space:nowrap">${formatDate(l.created_at)}</td>
        <td><span class="time-ago">${timeAgo(l.created_at)}</span></td>
        <td>
          <a href="https://wa.me/${waNumber}" target="_blank" rel="noopener" class="btn btn-whatsapp btn-xs" onclick="event.stopPropagation()" title="Abrir WhatsApp">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WA
          </a>
        </td>
      </tr>`;
    });
    tableHTML += `</tbody></table></div>`;

    // Pagination
    tableHTML += `<div class="pagination">
      <span>${totalFiltered} lead${totalFiltered !== 1 ? 's' : ''} ${state.filterStatus ? 'filtrados' : ''}</span>
      ${totalPages > 1 ? `<div class="pagination-pages">
        <button class="btn btn-ghost btn-xs" onclick="state.currentPage=Math.max(1,state.currentPage-1);renderResumen()" ${state.currentPage <= 1 ? 'disabled style="opacity:.3"' : ''}>‹</button>
        <span style="padding:0 .5rem;font-size:.85rem">${state.currentPage} / ${totalPages}</span>
        <button class="btn btn-ghost btn-xs" onclick="state.currentPage=Math.min(${totalPages},state.currentPage+1);renderResumen()" ${state.currentPage >= totalPages ? 'disabled style="opacity:.3"' : ''}>›</button>
      </div>` : ''}
    </div>`;
  }

  tableHTML += `</div>`;
  $('mainContent').innerHTML = statsHTML + tableHTML;
}

function renderLeads() {
  // Same as resumen but just the table view, full screen
  state.currentView = 'leads';
  renderResumen();
}

function renderKanban() {
  const leads = state.leads;
  let html = `<div style="display:flex;gap:1rem;overflow-x:auto;padding-bottom:1rem;height:100%;align-items:flex-start">`;
  STATUS_ORDER.forEach(status => {
    const info = STATUS_MAP[status];
    const cards = leads.filter(l => l.status === status);
    html += `<div style="flex-shrink:0;width:280px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-height:100%">
      <div style="padding:.85rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.85rem">
          <span class="status-dot" style="background:${info.color}"></span>
          ${esc(info.label)}
        </span>
        <span style="background:${info.bg};color:${info.color};font-size:.75rem;font-weight:600;padding:.15rem .5rem;border-radius:100px">${cards.length}</span>
      </div>
      <div style="flex:1;overflow-y:auto;padding:.75rem">`;
    if (cards.length === 0) {
      html += `<div style="text-align:center;padding:2rem .5rem;color:var(--text-muted);font-size:.8rem;border:1px dashed var(--border);border-radius:var(--radius-sm)">
        Sin leads
      </div>`;
    } else {
      cards.forEach(l => {
        const phoneClean = (l.phone||'').replace(/[^0-9]/g,'');
        const waNumber = phoneClean.startsWith('34') ? phoneClean : '34' + phoneClean;
        html += `<div class="card" style="margin-bottom:.6rem;cursor:pointer;padding:.85rem" onclick='openDetail(${JSON.stringify(l).replace(/'/g,"&#x27;")})'>
          <div style="font-weight:600;font-size:.88rem;margin-bottom:.2rem">${esc(l.name)}</div>
          <div style="font-size:.78rem;color:var(--text-secondary);margin-bottom:.3rem">${esc(l.business_type || '—')} · ${sourceBadgeHTML(l.source)}</div>
          <div style="font-size:.75rem;color:var(--text-muted)">${timeAgo(l.created_at)}</div>
          <div style="margin-top:.5rem;display:flex;gap:.35rem">
            <a href="https://wa.me/${waNumber}" target="_blank" rel="noopener" class="btn btn-whatsapp btn-xs" onclick="event.stopPropagation()">WhatsApp</a>
          </div>
        </div>`;
      });
    }
    html += `</div></div>`;
  });
  html += `</div>`;
  $('mainContent').innerHTML = html;
}

function sortLeads(col) {
  if (state.sortCol === col) {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    state.sortCol = col;
    state.sortDir = 'desc';
  }
  state.leads.sort((a, b) => {
    const va = (a[col] || '').toString().toLowerCase();
    const vb = (b[col] || '').toString().toLowerCase();
    if (va < vb) return state.sortDir === 'asc' ? -1 : 1;
    if (va > vb) return state.sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  renderResumen();
}

function sortIcon(col) {
  if (state.sortCol !== col) return '';
  return state.sortDir === 'asc' ? ' ↑' : ' ↓';
}

function refreshData() {
  fetchLeads();
}

// ─── Init ───
function init() {
  fetchLeads();
  // Auto-refresh every 30s
  setInterval(fetchLeads, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
