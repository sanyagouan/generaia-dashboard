
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeneraiA CRM Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Dark background */
            color: #e2e8f8; /* Light text */
        }
        [x-cloak] { display: none !important; }
        .card {
            background-color: #1e293b; /* Card background */
            border: 1px solid #334155; /* Card border */
            border-radius: 0.5rem;
            padding: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #f59e0b; /* Accent color */
            color: #1e293b;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 600;
        }
        .btn-secondary {
            background-color: #334155;
            color: #e2e8f8;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 600;
        }
        .badge-new { background-color: #f59e0b; color: #1e293b; } /* Amber */
        .badge-contacted { background-color: #22c55e; color: #1e293b; } /* Green */
        .badge-trial_scheduled { background-color: #3b82f6; color: #1e293b; } /* Blue */
        .badge-trial_done { background-color: #a855f7; color: #1e293b; } /* Purple */
        .badge-enrolled { background-color: #14b8a6; color: #1e293b; } /* Teal */
        .badge-lost { background-color: #ef4444; color: #1e293b; } /* Red */

        /* Override Tailwind's default button focus outline */
        button:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>
<body class="antialiased">
    <div x-data="dashboard()" x-init="init()">
        <!-- Header -->
        <header class="bg-[#1e293b] p-4 border-b-2 border-[#334155] flex justify-between items-center">
            <h1 class="text-3xl font-bold text-[#f59e0b]">GeneraiA CRM</h1>
            <div class="flex items-center space-x-4">
                <button @click="showNotifications = !showNotifications" class="relative">
                    <svg class="w-6 h-6 text-[#e2e8f8]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    <span x-show="newNotifications" class="absolute top-0 right-0 block h-2 w-2 rounded-full ring-2 ring-[#0f172a] bg-red-500"></span>
                </button>
            </div>
        </header>

        <!-- Notifications Panel -->
        <div x-cloak x-show="showNotifications" @click.away="showNotifications = false"
             class="fixed right-4 top-20 z-50 w-80 bg-[#1e293b] border border-[#334155] rounded-lg shadow-lg">
            <div class="p-4">
                <h3 class="text-lg font-semibold text-[#e2e8f8] mb-4">Notifications</h3>
                <ul class="space-y-2">
                    <template x-for="notification in notifications" :key="notification.id">
                        <li class="text-sm text-[#a8b1c4]">
                            <p class="font-medium" x-text="notification.title"></p>
                            <p x-text="notification.message"></p>
                            <span class="text-xs text-gray-500" x-text="new Date(notification.created_at).toLocaleString()"></span>
                        </li>
                    </template>
                    <li x-show="notifications.length === 0" class="text-center text-[#a8b1c4]">No new notifications.</li>
                </ul>
            </div>
        </div>

        <main class="p-6">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="card">
                    <h2 class="text-sm font-medium text-gray-400">Total Leads</h2>
                    <p class="text-3xl font-bold text-[#f59e0b]" x-text="stats.totalLeads"></p>
                </div>
                <div class="card">
                    <h2 class="text-sm font-medium text-gray-400">New Today</h2>
                    <p class="text-3xl font-bold text-[#f59e0b]" x-text="stats.newToday"></p>
                </div>
                <div class="card">
                    <h2 class="text-sm font-medium text-gray-400">Conversion Rate</h2>
                    <p class="text-3xl font-bold text-[#f59e0b]" x-text="stats.conversionRate + '%'"></p>
                </div>
                <div class="card">
                    <h2 class="text-sm font-medium text-gray-400">Most Popular Interest</h2>
                    <p class="text-2xl font-bold text-[#f59e0b]" x-text="stats.mostPopularInterest"></p>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4 text-[#e2e8f8]">Leads Per Day (Last 30 Days)</h2>
                    <canvas id="leadsPerDayChart"></canvas>
                </div>
                <div class="card">
                    <h2 class="text-xl font-semibold mb-4 text-[#e2e8f8]">Lead Pipeline Funnel</h2>
                    <canvas id="pipelineChart"></canvas>
                </div>
            </div>

            <!-- View Toggle & Controls -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 space-y-4 md:space-y-0">
                <div class="flex space-x-2">
                    <button @click="currentView = 'kanban'; $nextTick(() => initializeKanban());" :class="{'btn-primary': currentView === 'kanban', 'btn-secondary': currentView !== 'kanban'}" class="btn-primary">Kanban View</button>
                    <button @click="currentView = 'table'" :class="{'btn-primary': currentView === 'table', 'btn-secondary': currentView !== 'table'}" class="btn-secondary">Table View</button>
                </div>
                <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4 w-full md:w-auto">
                    <input type="text" x-model.debounce.300ms="searchTerm" placeholder="Search leads..." class="bg-[#0f172a] text-[#e2e8f8] border border-[#334155] rounded-md px-3 py-2 w-full md:w-64">
                    <select x-model="filterStatus" @change="fetchLeads()" class="bg-[#0f172a] text-[#e2e8f8] border border-[#334155] rounded-md px-3 py-2 w-full md:w-48">
                        <option value="">All Statuses</option>
                        <template x-for="status in leadStatuses" :key="status">
                            <option :value="status" x-text="status.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())"></option>
                        </template>
                    </select>
                    <button @click="exportCSV()" class="btn-primary flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Export CSV
                    </button>
                    <button @click="openLeadDetail()" class="btn-primary flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Add Lead
                    </button>
                </div>
            </div>

            <!-- Kanban View -->
            <div x-cloak x-show="currentView === 'kanban'" class="overflow-x-auto">
                <div class="inline-flex space-x-6 pb-4">
                    <template x-for="status in leadStatuses" :key="status">
                        <div class="kanban-column w-80 flex-shrink-0 bg-[#1e293b] rounded-lg p-4 shadow-md border border-[#334155]">
                            <h3 class="font-semibold text-lg mb-4 text-[#e2e8f8] flex justify-between items-center">
                                <span x-text="status.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())"></span>
                                <span class="bg-[#f59e0b] text-[#1e293b] text-xs font-semibold px-2 py-1 rounded-full" x-text="kanbanCounts[status] || 0"></span>
                            </h3>
                            <div :id="`kanban-${status}`" class="min-h-[100px] space-y-3" :data-status="status">
                                <template x-for="lead in leads.filter(l => l.status === status)" :key="lead.id">
                                    <div class="card p-3 cursor-grab" draggable="true" :data-id="lead.id" @click="openLeadDetail(lead)">
                                        <p class="font-medium text-[#e2e8f8]" x-text="lead.name"></p>
                                        <p class="text-sm text-gray-400" x-text="lead.email"></p>
                                        <div class="flex justify-end mt-2 space-x-2 text-gray-400">
                                            <a :href="`https://wa.me/${lead.whatsapp_id || lead.phone}`" target="_blank" class="hover:text-[#f59e0b]">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                            </a>
                                            <a :href="`tel:${lead.phone}`" class="hover:text-[#f59e0b]">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                            </a>
                                            <a :href="`mailto:${lead.email}`" class="hover:text-[#f59e0b]">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                            </a>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Table View -->
            <div x-cloak x-show="currentView === 'table'" class="card p-6">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-[#334155]">
                        <thead>
                            <tr>
                                <template x-for="column in tableColumns" :key="column.key">
                                    <th @click="sortByColumn(column.key)"
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider cursor-pointer">
                                        <div class="flex items-center">
                                            <span x-text="column.label"></span>
                                            <span x-show="sortColumn === column.key">
                                                <svg x-show="sortDirection === 'asc'" class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                                <svg x-show="sortDirection === 'desc'" class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                            </span>
                                        </div>
                                    </th>
                                </template>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-[#334155]">
                            <template x-for="lead in paginatedLeads" :key="lead.id">
                                <tr @click="openLeadDetail(lead)" class="hover:bg-[#334155] cursor-pointer">
                                    <td class="px-6 py-4 whitespace-nowrap" x-text="lead.name"></td>
                                    <td class="px-6 py-4 whitespace-nowrap" x-text="lead.email"></td>
                                    <td class="px-6 py-4 whitespace-nowrap" x-text="lead.phone"></td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                              :class="{
                                                'badge-new': lead.status === 'new',
                                                'badge-contacted': lead.status === 'contacted',
                                                'badge-trial_scheduled': lead.status === 'trial_scheduled',
                                                'badge-trial_done': lead.status === 'trial_done',
                                                'badge-enrolled': lead.status === 'enrolled',
                                                'badge-lost': lead.status === 'lost'
                                              }"
                                              x-text="lead.status.replace(/_/g, ' ').toUpperCase()"></span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap" x-text="lead.course_interest"></td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <div class="flex items-center space-x-2 text-gray-400">
                                            <a :href="`https://wa.me/${lead.whatsapp_id || lead.phone}`" target="_blank" class="hover:text-[#f59e0b]">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                            </a>
                                            <a :href="`tel:${lead.phone}`" class="hover:text-[#f59e0b]">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                            </a>
                                            <a :href="`mailto:${lead.email}`" class="hover:text-[#f59e0b]">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="paginatedLeads.length === 0">
                                <td :colspan="tableColumns.length + 1" class="px-6 py-4 text-center text-gray-400">No leads found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <nav class="flex justify-between items-center pt-4" x-show="filteredLeads.length > 0">
                    <button @click="prevPage()" :disabled="currentPage === 1" class="btn-secondary disabled:opacity-50">Previous</button>
                    <span class="text-[#e2e8f8]">Page <span x-text="currentPage"></span> of <span x-text="totalPages"></span></span>
                    <button @click="nextPage()" :disabled="currentPage === totalPages" class="btn-secondary disabled:opacity-50">Next</button>
                </nav>
            </div>
        </main>

        <!-- Lead Detail Modal/Panel -->
        <div x-cloak x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-x-full"
             x-transition:enter-end="opacity-100 translate-x-0"
             x-transition:leave="transition ease-in duration-300"
             x-transition:leave-start="opacity-100 translate-x-0"
             x-transition:leave-end="opacity-0 translate-x-full"
             x-show="showLeadDetail"
             class="fixed inset-0 z-50 overflow-y-auto">
            <div class="absolute inset-0 bg-gray-900 bg-opacity-75"></div>
            <div class="fixed top-0 right-0 w-full md:w-1/3 bg-[#0f172a] h-full shadow-lg p-6 flex flex-col">
                <div class="flex justify-between items-center mb-6 border-b border-[#334155] pb-4">
                    <h2 class="text-2xl font-bold text-[#f59e0b]" x-text="editingLead.id ? 'Edit Lead' : 'Add New Lead'"></h2>
                    <button @click="closeLeadDetail()" class="text-[#e2e8f8] hover:text-[#f59e0b]">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <form @submit.prevent="saveLead()" class="flex-grow overflow-y-auto pr-2">
                    <div class="space-y-4">
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-400">Name</label>
                            <input type="text" id="name" x-model="editingLead.name" required
                                   class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-400">Email</label>
                            <input type="email" id="email" x-model="editingLead.email" required
                                   class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]">
                        </div>
                        <div>
                            <label for="phone" class="block text-sm font-medium text-gray-400">Phone</label>
                            <input type="tel" id="phone" x-model="editingLead.phone"
                                   class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]">
                        </div>
                        <div>
                            <label for="whatsapp_id" class="block text-sm font-medium text-gray-400">WhatsApp ID</label>
                            <input type="text" id="whatsapp_id" x-model="editingLead.whatsapp_id"
                                   class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]">
                        </div>
                        <div>
                            <label for="course_interest" class="block text-sm font-medium text-gray-400">Course Interest</label>
                            <input type="text" id="course_interest" x-model="editingLead.course_interest"
                                   class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]">
                        </div>
                        <div>
                            <label for="preferred_schedule" class="block text-sm font-medium text-gray-400">Preferred Schedule</label>
                            <input type="text" id="preferred_schedule" x-model="editingLead.preferred_schedule"
                                   class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]">
                        </div>
                        <div>
                            <label for="source" class="block text-sm font-medium text-gray-400">Source</label>
                            <input type="text" id="source" x-model="editingLead.source"
                                   class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]">
                        </div>
                        <div>
                            <label for="status" class="block text-sm font-medium text-gray-400">Status</label>
                            <select id="status" x-model="editingLead.status"
                                    class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]">
                                <template x-for="status in leadStatuses" :key="status">
                                    <option :value="status" x-text="status.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label for="notes" class="block text-sm font-medium text-gray-400">Notes</label>
                            <textarea id="notes" x-model="editingLead.notes" rows="4"
                                      class="mt-1 block w-full bg-[#1e293b] text-[#e2e8f8] border border-[#334155] rounded-md shadow-sm p-2 focus:ring-[#f59e0b] focus:border-[#f59e0b]"></textarea>
                        </div>
                        <div x-show="editingLead.created_at">
                            <label class="block text-sm font-medium text-gray-400">Created At</label>
                            <p class="mt-1 text-[#e2e8f8]" x-text="new Date(editingLead.created_at).toLocaleString()"></p>
                        </div>
                        <div x-show="editingLead.updated_at">
                            <label class="block text-sm font-medium text-gray-400">Updated At</label>
                            <p class="mt-1 text-[#e2e8f8]" x-text="new Date(editingLead.created_at).toLocaleString()"></p>
                        </div>
                    </div>
                    <div class="mt-6">
                        <button type="submit" class="btn-primary w-full">Save Lead</button>
                        <button type="button" @click="deleteLead(editingLead.id)" x-show="editingLead.id" class="btn-secondary w-full mt-2 bg-red-600 hover:bg-red-700">Delete Lead</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- CDNs for JS -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        const SUPABASE_URL = '/api'; // Nginx proxies to Supabase
        const SUPABASE_ANON_KEY = '${SUPABASE_ANON_KEY}'; // Replaced by envsubst

        function dashboard() {
            return {
                currentView: 'kanban',
                leads: [],
                notifications: [],
                showNotifications: false,
                newNotifications: false,
                searchTerm: '',
                filterStatus: '',
                sortColumn: 'created_at',
                sortDirection: 'desc',
                currentPage: 1,
                itemsPerPage: 10,
                showLeadDetail: false,
                editingLead: {},
                leadStatuses: ['new', 'contacted', 'trial_scheduled', 'trial_done', 'enrolled', 'lost'],
                kanbanCounts: {},
                tableColumns: [
                    { key: 'name', label: 'Name' },
                    { key: 'email', label: 'Email' },
                    { key: 'phone', label: 'Phone'  },
                    { key: 'status', label: 'Status'  },
                    { key: 'course_interest', label: 'Interest'  },
                ],
                stats: {
                    totalLeads: 0,
                    newToday: 0,
                    conversionRate: 0,
                    mostPopularInterest: 'N/A'
                },
                leadsPerDayChart: null,
                pipelineChart: null,

                init() {
                    this.fetchLeads();
                    this.fetchNotifications();
                    this.fetchStats();
                    this.fetchChartData();

                    this.$watch('leads', () => {
                        this.updateKanbanCounts();
                        if (this.currentView === 'kanban') {
                            this.$nextTick(() => this.initializeKanban());
                        }
                    });

                    this.$watch('searchTerm', () => this.currentPage = 1);
                    this.$watch('filterStatus', () => this.currentPage = 1);
                },

                async fetchData(endpoint, options = {}) {
                    const headers = {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        ...options.headers
                    };
                    try {
                        const response = await fetch(`${SUPABASE_URL}${endpoint}`, {
                            ...options,
                            headers
                        });
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.message || `HTTP error! status: ${response.status}`);
                        }
                        return response.json();
                    } catch (error) {
                        console.error('API Error:', error);
                        // alert('An API error occurred: ' + error.message);
                        return null;
                    }
                },

                async fetchLeads() {
                    let endpoint = '/rest/v1/leads?order=created_at.desc';
                    const filters = [];

                    if (this.filterStatus) {
                        filters.push(`status=eq.${this.filterStatus}`);
                    }
                    if (this.searchTerm) {
                        const encodedSearchTerm = encodeURIComponent(`%${this.searchTerm}%`);
                        filters.push(`or=(name.ilike.${encodedSearchTerm},email.ilike.${encodedSearchTerm},phone.ilike.${encodedSearchTerm},course_interest.ilike.${encodedSearchTerm},source.ilike.${encodedSearchTerm})`);
                    }

                    if (filters.length > 0) {
                        endpoint += '&' + filters.join('&');
                    }

                    const data = await this.fetchData(endpoint);
                    if (data) {
                        this.leads = data;
                        this.updateKanbanCounts();
                        if (this.currentView === 'kanban') {
                            this.$nextTick(() => this.initializeKanban());
                        }
                        this.sortLeads();
                    }
                },

                async fetchNotifications() {
                    const data = await this.fetchData('/rest/v1/notifications?order=created_at.desc&limit=10');
                    if (data) {
                        this.notifications = data;
                        this.newNotifications = data.length > 0;
                    }
                },

                async fetchStats() {
                    // Total Leads
                    const totalLeadsResponse = await this.fetchData('/rest/v1/leads?count=exact', { method: 'HEAD' });
                    if (totalLeadsResponse) {
                        this.stats.totalLeads = parseInt(totalLeadsResponse.headers.get('Content-Range').split('/')[1]);
                    }

                    // New Today
                    const today = new Date().toISOString().split('T')[0];
                    const newTodayResponse = await this.fetchData(`/rest/v1/leads?created_at=gte.${today}T00:00:00.000Z&count=exact`, { method: 'HEAD' });
                     if (newTodayResponse) {
                        this.stats.newToday = parseInt(newTodayResponse.headers.get('Content-Range').split('/')[1]);
                    }

                    // Conversion Rate (simple: (enrolled / total) * 100)
                    const enrolledLeadsResponse = await this.fetchData('/rest/v1/leads?status=eq.enrolled&count=exact', { method: 'HEAD' });
                     if (enrolledLeadsResponse) {
                        const enrolledCount = parseInt(enrolledLeadsResponse.headers.get('Content-Range').split('/')[1]);
                        this.stats.conversionRate = this.stats.totalLeads > 0 ? ((enrolledCount / this.stats.totalLeads) * 100).toFixed(2) : 0;
                    }

                    // Most Popular Interest (requires a bit more logic, group by course_interest and count)
                    // This would ideally be a Supabase function or view, for now, simulate by client-side counting
                    const allLeads = await this.fetchData('/rest/v1/leads?select=course_interest');
                    if (allLeads) {
                        const interestCounts = {};
                        allLeads.forEach(lead => {
                            if (lead.course_interest) {
                                interestCounts[lead.course_interest] = (interestCounts[lead.course_interest] || 0) + 1;
                            }
                        });
                        const sortedInterests = Object.entries(interestCounts).sort(([,a],[,b]) => b - a);
                        this.stats.mostPopularInterest = sortedInterests.length > 0 ? sortedInterests[0][0] : 'N/A';
                    }
                },

                async fetchChartData() {
                    // Leads Per Day (last 30 days)
                    const today = new Date();
                    const dates = Array.from({ length: 30 }, (_, i) => {
                        const d = new Date(today);
                        d.setDate(today.getDate() - (29 - i));
                        return d.toISOString().split('T')[0];
                    });

                    const leadsByDay = {};
                    for ( const date of dates) {
                        leadsByDay[date] = 0;
                    }

                    const thirtyDaysAgo = new Date();
                    thirtyDaysAgo.setDate(today.getDate() - 30); // 30 days ago at 00:00:00
                    const thirtyDaysAgoISO = thirtyDaysAgo.toISOString().split('T')[0] + 'T00:00:00.000Z';

                    const leadsInPeriod = await this.fetchData(`/rest/v1/leads?select=created_at&created_at=gte.${thirtyDaysAgoISO}`);

                    if (leadsInPeriod) {
                        leadsInPeriod.forEach(lead => {
                            const date = new Date(lead.created_at).toISOString().split('T')[0];
                            if (leadsByDay.hasOwnProperty(date)) {
                                leadsByDay[date]++;
                            }
                        });
                    }

                    this.renderLeadsPerDayChart(Object.keys(leadsByDay), Object.values(leadsByDay));

                    // Pipeline Chart
                    const pipelineCounts = {};
                    for ( const status of this.leadStatuses) {
                        const response = await this.fetchData(`/rest/v1/leads?status=eq.${status}&count=exact`, { method: 'HEAD' });
                        if (response) {
                            pipelineCounts[status] = parseInt(response.headers.get('Content-Range').split('/')[1]);
                        }
                    }
                    this.renderPipelineChart(pipelineCounts);
                },

                renderLeadsPerDayChart(labels, data) {
                    const ctx = document.getElementById('leadsPerDayChart').getContext('2d');
                    if (this.leadsPerDayChart) {
                        this.leadsPerDayChart.destroy();
                    }
                    this.leadsPerDayChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Leads Created',
                                data: data,
                                borderColor: '#f59e0b', // Accent color
                                backgroundColor: 'rgba(245, 158, 11, 0.2)',
                                fill: true,
                                tension: 0.1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                x: {
                                    type: 'category', // Ensure x-axis handles categories for dates
                                    labels: labels,
                                    ticks: {
                                        color: '#a8b1c4' // Text color
                                    },
                                    grid: {
                                        color: '#334155' // Border color
                                    }
                                },
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        color: '#a8b1c4', // Text color
                                        precision: 0
                                    },
                                    grid: {
                                        color: '#334155' // Border color
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: '#e2e8f8'
                                    }
                                }
                            }
                        }
                    });
                },

                renderPipelineChart(countsData) {
                    const labels = this.leadStatuses.map(s => s.replace(/_/g, ' ')).map(s => s.replace(/\b\w/g, l => l.toUpperCase()));
                    const data = this.leadStatuses.map(status => countsData[status] || 0);

                    const ctx = document.getElementById('pipelineChart').getContext('2d');
                    if (this.pipelineChart) {
                        this.pipelineChart.destroy();
                    }
                    this.pipelineChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Number of Leads',
                                data: data,
                                backgroundColor: [
                                    '#f59e0b', // new
                                    '#22c55e', // contacted
                                    '#3b82f6', // trial_scheduled
                                    '#a855f7', // trial_done
                                    '#14b8a6', // enrolled
                                    '#ef4444'  // lost
                                ],
                                borderColor: '#334155',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            indexAxis: 'y', // Make it a horizontal bar chart
                            scales: {
                                x: {
                                    beginAtZero: true,
                                    ticks: {
                                        color: '#a8b1c4',
                                        precision: 0
                                    },
                                    grid: {
                                        color: '#334155'
                                    }
                                },
                                y: {
                                    ticks: {
                                        color: '#a8b1c4'
                                    },
                                    grid: {
                                        color: '#334155'
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    display: false,
                                    labels: {
                                        color: '#e2e8f8'
                                    }
                                }
                            }
                        }
                    });
                },

                updateKanbanCounts() {
                    const counts = {};
                    this.leadStatuses.forEach(status => {
                        counts[status] = this.leads.filter(lead => lead.status === status).length;
                    });
                    this.kanbanCounts = counts;
                },

                initializeKanban() {
                    this.leadStatuses.forEach(status => {
                        const el = document.getElementById(`kanban-${status}`);
                        if (el) {
                            new Sortable(el, {
                                group: 'kanban',
                                animation: 150,
                                onEnd: (evt) => {
                                    const leadId = evt.item.dataset.id;
                                    const newStatus = evt.to.dataset.status;
                                    this.updateLeadStatus(leadId, newStatus);
                                }
                            });
                        }
                    });
                },

                async updateLeadStatus(leadId, newStatus) {
                    const leadIndex = this.leads.findIndex(l => l.id == leadId);
                    if (leadIndex > -1) {
                        const originalLead = { ...this.leads[leadIndex] };
                        const updatedLead = { ...originalLead, status: newStatus };

                        // Optimistically update UI
                        this.leads[leadIndex].status = newStatus;
                        this.updateKanbanCounts();

                        const success = await this.patchLead(leadId, { status: newStatus });
                        if (!success) {
                            // Revert UI if API call fails
                            this.leads[leadIndex].status = originalLead.status;
                            this.updateKanbanCounts();
                            alert('Failed to update lead status.');
                        } else {
                            this.fetchStats(); // Update stats as conversion might change
                            this.fetchChartData(); // Update charts
                        }
                    }
                },

                openLeadDetail(lead = {}) {
                    this.editingLead = lead.id ? { ...lead } : {
                        id: null,
                        name: '',
                        email: '',
                        phone: '',
                        course_interest: '',
                        preferred_schedule: '',
                        source: '',
                        status: 'new',
                        whatsapp_id: '',
                        notes: ''
                    };
                    this.showLeadDetail = true;
                },

                closeLeadDetail() {
                    this.showLeadDetail = false;
                    this.editingLead = {};
                },

                async saveLead() {
                    const payload = { ...this.editingLead };

                     // Remove fields that shouldn't be sent on create/update
                    delete payload.id;
                    delete payload.created_at;
                    delete payload.updated_at;

                    let success = false;
                    if (this.editingLead.id) {
                        // Update existing lead
                        success = await this.patchLead(this.editingLead.id, payload);
                    } else {
                        // Create new lead
                        const newLead = await this.createLead(payload);
                        success = !!newLead;
                    }

                    if (success) {
                        this.closeLeadDetail();
                        this.fetchLeads(); // Re-fetch leads to update UI and counts
                        this.fetchStats();
                        this.fetchChartData();
                    } else {
                        alert('Failed to save lead.');
                    }
                },

                async createLead(payload) {
                    return await this.fetchData('/rest/v1/leads', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                },

                async patchLead(id, payload) {
                     // Supabase PATCH uses specific syntax for primary key in URL
                    const data = await this.fetchData(`/rest/v1/leads?id=eq.${id}`, {
                        method: 'PATCH',
                        body: JSON.stringify(payload)
                    });
                    return !!data;
                },

                async deleteLead(id) {
                    if (!confirm('Are you sure you want to delete this lead?')) return;

                    const success = await this.fetchData(`/rest/v1/leads?id=eq.${id}`, {
                        method: 'DELETE'
                    });

                    if (success) {
                        this.closeLeadDetail();
                        this.fetchLeads();
                        this.fetchStats();
                        this.fetchChartData();
                    } else {
                        alert('Failed to delete lead.');
                    }
                },

                // Table View Logic
                sortLeads() {
                    this.leads.sort((a, b) => {
                        let res = 0;
                        if (a[this.sortColumn] < b[this.sortColumn]) res = -1;
                        if (a[this.sortColumn] > b[this.sortColumn]) res = 1;
                        return this.sortDirection === 'asc' ? res : -res;
                    });
                },

                sortByColumn(column) {
                    if (this.sortColumn === column) {
                        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        this.sortColumn = column;
                        this.sortDirection = 'asc';
                    }
                    this.sortLeads();
                },

                get filteredLeads() {
                    let filtered = this.leads;

                    if (this.filterStatus) {
                        filtered = filtered.filter(lead => lead.status === this.filterStatus);
                    }

                    if (this.searchTerm) {
                        const term = this.searchTerm.toLowerCase();
                        filtered = filtered.filter(lead =>
                            lead.name.toLowerCase().includes(term) ||
                            lead.email.toLowerCase().includes(term) ||
                            lead.phone?.toLowerCase().includes(term) ||
                            lead.course_interest?.toLowerCase().includes(term) ||
                            lead.source?.toLowerCase().includes(term)
                        );
                    }
                    return filtered;
                },

                get paginatedLeads() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    const end = start + this.itemsPerPage;
                    return this.filteredLeads.slice(start, end);
                },

                get totalPages() {
                    return Math.ceil(this.filteredLeads.length / this.itemsPerPage);
                },

                nextPage() {
                    if (this.currentPage < this.totalPages) {
                        this.currentPage++;
                    }
                },

                prevPage() {
                    if (this.currentPage > 1) {
                        this.currentPage--;
                    }
                },

                exportCSV() {
                    const headers = this.tableColumns.map(col => col.label).join(',');
                    const data = this.filteredLeads.map(lead =>
                        this.tableColumns.map(col => {
                            let value = lead[col.key];
                            if (col.key === 'status') {
                                value = value.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                            }
                            return `"${String(value || '').replace(/"/g, '""')}"`;
                        }).join(',')
                    ).join('\n');

                    const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + data;
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", "leads_export.csv");
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            };
        }
    </script>
</body>
</html>
