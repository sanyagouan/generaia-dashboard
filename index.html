<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeneraIA Leads Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg-color: #1e293b;
            --border-color: #334155;
            --accent-color: #f59e0b;
            --text-color: #e2e8f0;
            --secondary-text-color: #94a3b8;
            --input-bg-color: #334155;
            --input-border-color: #475569;
            --hover-color: #3f4e64;
            --active-color: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin: auto;
            transition: all 0.3s ease-in-out;
        }

        .dashboard-container.sidebar-open {
            grid-template-columns: 2fr 1fr;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .table-container, .chart-container, .notifications-container {
            grid-column: span 1;
        }

        .table-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .table-toolbar input,
        .table-toolbar select,
        .table-toolbar button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--input-border-color);
            background-color: var(--input-bg-color);
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .table-toolbar button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .table-toolbar button:hover {
            background-color: #e68a00;
        }

        .leads-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .leads-table th,
        .leads-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .leads-table th {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--secondary-text-color);
            cursor: pointer;
            position: sticky;
            top: 0;
            background-color: var(--card-bg-color);
        }

        .leads-table th:hover {
            background-color: var(--hover-color);
        }

        .leads-table td {
            font-size: 0.9rem;
        }

        .leads-table tbody tr:hover {
            background-color: var(--hover-color);
            cursor: pointer;
        }

        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .pagination button {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background-color: var(--hover-color);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            font-size: 0.9rem;
        }

        .sidebar {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 0;
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: width 0.3s ease-in-out;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            width: 350px;
            padding: 20px;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .sidebar-header h3 {
            margin: 0;
            color: var(--text-color);
        }

        .sidebar-close {
            background: none;
            border: none;
            color: var(--secondary-text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
        }

        .lead-detail-item {
            margin-bottom: 15px;
        }

        .lead-detail-item label {
            display: block;
            font-size: 0.85rem;
            color: var(--secondary-text-color);
            margin-bottom: 5px;
        }

        .lead-detail-item p,
        .lead-detail-item input,
        .lead-detail-item select,
        .lead-detail-item textarea {
            font-size: 0.95rem;
            color: var(--text-color);
            background-color: var(--input-bg-color);
            border: 1px solid var(--input-border-color);
            border-radius: 6px;
            padding: 8px 12px;
            width: calc(100% - 24px);
            box-sizing: border-box;
        }

        .lead-detail-item textarea {
            min-height: 80px;
            resize: vertical;
        }

        .lead-detail-item p {
            padding: 10px 12px; /* Adjust padding for display only */
        }

        .status-selector {
            display: block;
            width: calc(100% - 24px);
        }

        .update-status-button {
            background-color: var(--accent-color);
            color: var(--bg-color);
            font-weight: 500;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            margin-top: 15px;
        }

        .update-status-button:hover {
            background-color: #e68a00;
        }

        .chart-card {
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chart-card canvas {
            max-width: 100%;
            max-height: 100%;
        }

        .notification-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-title {
            font-weight: 500;
            margin-bottom: 5px;
            color: var(--accent-color);
        }

        .notification-message {
            font-size: 0.9rem;
            color: var(--secondary-text-color);
        }
        .notification-date {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-container.sidebar-open {
                grid-template-columns: 1fr;
            }
            .sidebar.open {
                width: 100%;
                right: 0;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .table-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }
            .table-toolbar > * {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container" id="dashboardContainer">
        <div class="main-content">
            <div class="stats-grid">
                <div class="card">
                    <div class="card-title">Total Leads</div>
                    <div class="card-value" id="totalLeads">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Nuevos Hoy</div>
                    <div class="card-value" id="newLeadsToday">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Tasa Conversión</div>
                    <div class="card-value" id="conversionRate">0%</div>
                </div>
                <div class="card">
                    <div class="card-title">Curso Popular</div>
                    <div class="card-value" id="popularCourse">N/A</div>
                </div>
            </div>

            <div class="card table-container">
                <div class="table-toolbar">
                    <input type="text" id="searchInput" placeholder="Buscar leads...">
                    <select id="statusFilter">
                        <option value="">Todos los Estados</option>
                        <option value="new">Nuevo</option>
                        <option value="contacted">Contactado</option>
                        <option value="trial_scheduled">Trial Agendado</option>
                        <option value="trial_done">Trial Realizado</option>
                        <option value="enrolled">Inscrito</option>
                        <option value="lost">Perdido</option>
                    </select>
                    <button id="exportCsvButton">Exportar CSV</button>
                </div>
                <table class="leads-table">
                    <thead>
                        <tr>
                            <th data-sort="name">Nombre</th>
                            <th data-sort="email">Email</th>
                            <th data-sort="course_interest">Curso Interés</th>
                            <th data-sort="status">Estado</th>
                            <th data-sort="created_at">Fecha Creación</th>
                        </tr>
                    </thead>
                    <tbody id="leadsTableBody">
                        <!-- Leads will be loaded here -->
                    </tbody>
                </table>
                <div class="pagination">
                    <button id="prevPage">Anterior</button>
                    <span id="pageInfo">Página 1 de 1</span>
                    <button id="nextPage">Siguiente</button>
                </div>
            </div>

            <div class="card chart-container chart-card">
                <canvas id="leadsChart"></canvas>
            </div>

            <div class="card notifications-container">
                <h3 class="card-title" style="color: var(--text-color);">Notificaciones</h3>
                <div id="notificationsList">
                    <!-- Notifications will be loaded here -->
                </div>
            </div>
        </div>

        <div class="sidebar" id="leadDetailSidebar">
            <div class="sidebar-header">
                <h3>Detalle del Lead</h3>
                <button class="sidebar-close" id="closeSidebarButton">&times;</button>
            </div>
            <div id="leadDetailContent">
                <div class="lead-detail-item">
                    <label>ID:</label>
                    <p id="detailId"></p>
                </div>
                <div class="lead-detail-item">
                    <label>Nombre:</label>
                    <input type="text" id="detailName" readonly>
                </div>
                <div class="lead-detail-item">
                    <label>Email:</label>
                    <input type="email" id="detailEmail" readonly>
                </div>
                <div class="lead-detail-item">
                    <label>Teléfono:</label>
                    <input type="tel" id="detailPhone" readonly>
                </div>
                <div class="lead-detail-item">
                    <label>Interés del Curso:</label>
                    <input type="text" id="detailCourseInterest" readonly>
                </div>
                <div class="lead-detail-item">
                    <label>Horario Preferido:</label>
                    <input type="text" id="detailPreferredSchedule" readonly>
                </div>
                <div class="lead-detail-item">
                    <label>Origen:</label>
                    <p id="detailSource"></p>
                </div>
                <div class="lead-detail-item">
                    <label for="detailStatus">Estado:</label>
                    <select id="detailStatus" class="status-selector">
                        <option value="new">Nuevo</option>
                        <option value="contacted">Contactado</option>
                        <option value="trial_scheduled">Trial Agendado</option>
                        <option value="trial_done">Trial Realizado</option>
                        <option value="enrolled">Inscrito</option>
                        <option value="lost">Perdido</option>
                    </select>
                </div>
                <div class="lead-detail-item">
                    <label>WhatsApp ID:</label>
                    <input type="text" id="detailWhatsappId" readonly>
                </div>
                <div class="lead-detail-item">
                    <label>Notas:</label>
                    <textarea id="detailNotes" readonly></textarea>
                </div>
                <div class="lead-detail-item">
                    <label>Creado:</label>
                    <p id="detailCreatedAt"></p>
                </div>
                <div class="lead-detail-item">
                    <label>Actualizado:</label>
                    <p id="detailUpdatedAt"></p>
                </div>
                <button class="update-status-button" id="updateStatusButton">Actualizar Estado</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = '/api';
        const SUPABASE_ANON_KEY = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc4MDYxOTU4MCwiZXhwIjo0OTM2MjkzMTgwLCJyb2xlIjoiYW5vbiJ9.rmzrlffEwrpL5woucUEBOteZnCRkU5pQ3Yt0TCCiAFI';


        // Direct API client — no SDK, just fetch
        const supabaseFetch = {
            get: async (table, options = {}) => {
                const params = new URLSearchParams();
                if (options.select) params.set('select', options.select);
                if (options.limit) params.set('limit', options.limit);
                if (options.order) params.set('order', options.order);
                if (options.filter) params.set(options.filter.col, `eq.${options.filter.val}`);
                const url = `${SUPABASE_URL}/rest/v1/${table}?${params.toString()}`;
                const res = await fetch(url, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ***`,
                        'Content-Type': 'application/json',
                    }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
                return await res.json();
            },
            patch: async (table, id, data) => {
                const url = `${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`;
                const res = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ***`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal',
                    },
                    body: JSON.stringify(data),
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return true;
            }
        };

        let allLeads = [];
        let filteredLeads = [];
        let currentPage = 1;
        const leadsPerPage = 10;
        let sortColumn = 'created_at';
        let sortDirection = 'desc'; // 'asc' or 'desc'
        let leadsChartInstance;
        let selectedLeadId = null;

        const leadStatusMap = {
            'new': 'Nuevo',
            'contacted': 'Contactado',
            'trial_scheduled': 'Trial Agendado',
            'trial_done': 'Trial Realizado',
            'enrolled': 'Inscrito',
            'lost': 'Perdido'
        };

        async function fetchData() {
            await Promise.all([
                fetchLeads(),
                fetchNotifications()
            ]);
            updateDashboard();
        }

        async function fetchLeads() {
            try {
                const data = await supabaseFetch.get('leads', { select: '*', order: 'created_at.desc' });
                allLeads = data;
                applyFiltersAndSort();
            } catch (error) {
                console.error('Error fetching leads:', error.message);
            }
        }

        async function fetchNotifications() {
            try {
                const data = await supabaseFetch.get('notifications', { select: '*', order: 'created_at.desc', limit: 5 });
                renderNotifications(data);
            } catch (error) {
                console.error('Error fetching notifications:', error.message);
            }
        }

        function applyFiltersAndSort() {
            let tempLeads = [...allLeads];

            // Apply search filter
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                tempLeads = tempLeads.filter(lead =>
                    lead.name.toLowerCase().includes(searchTerm) ||
                    lead.email.toLowerCase().includes(searchTerm) ||
                    (lead.phone && lead.phone.toLowerCase().includes(searchTerm)) ||
                    (lead.course_interest && lead.course_interest.toLowerCase().includes(searchTerm)) ||
                    (lead.source && lead.source.toLowerCase().includes(searchTerm))
                );
            }

            // Apply status filter
            const statusFilter = document.getElementById('statusFilter').value;
            if (statusFilter) {
                tempLeads = tempLeads.filter(lead => lead.status === statusFilter);
            }

            // Apply sorting
            tempLeads.sort((a, b) => {
                const aValue = a[sortColumn] || '';
                const bValue = b[sortColumn] || '';

                if (aValue < bValue) return sortDirection === 'asc' ? -1 : 1;
                if (aValue > bValue) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });

            filteredLeads = tempLeads;
            renderLeadsTable();
            updateStats();
            renderLeadsChart();
        }

        function updateStats() {
            document.getElementById('totalLeads').textContent = allLeads.length;

            const today = new Date().toISOString().split('T')[0];
            const newLeadsToday = allLeads.filter(lead => lead.created_at.startsWith(today)).length;
            document.getElementById('newLeadsToday').textContent = newLeadsToday;

            const enrolledLeads = allLeads.filter(lead => lead.status === 'enrolled').length;
            const conversionRate = allLeads.length > 0 ? ((enrolledLeads / allLeads.length) * 100).toFixed(2) : 0;
            document.getElementById('conversionRate').textContent = `${conversionRate}%`;

            const courseCounts = {};
            allLeads.forEach(lead => {
                if (lead.course_interest) {
                    courseCounts[lead.course_interest] = (courseCounts[lead.course_interest] || 0) + 1;
                }
            });
            let popularCourse = 'N/A';
            let maxCount = 0;
            for (const course in courseCounts) {
                if (courseCounts[course] > maxCount) {
                    maxCount = courseCounts[course];
                    popularCourse = course;
                }
            }
            document.getElementById('popularCourse').textContent = popularCourse;
        }

        function renderLeadsTable() {
            const tableBody = document.getElementById('leadsTableBody');
            tableBody.innerHTML = '';

            const start = (currentPage - 1) * leadsPerPage;
            const end = start + leadsPerPage;
            const leadsToDisplay = filteredLeads.slice(start, end);

            leadsToDisplay.forEach(lead => {
                const row = tableBody.insertRow();
                row.dataset.leadId = lead.id;
                row.innerHTML = `
                    <td>${lead.name}</td>
                    <td>${lead.email}</td>
                    <td>${lead.course_interest || 'N/A'}</td>
                    <td><span class="status-${lead.status}">${leadStatusMap[lead.status] || lead.status}</span></td>
                    <td>${new Date(lead.created_at).toLocaleDateString()}</td>
                `;
                row.addEventListener('click', () => openLeadDetail(lead));
            });

            updatePaginationInfo();
        }

        function updatePaginationInfo() {
            const totalPages = Math.ceil(filteredLeads.length / leadsPerPage);
            document.getElementById('pageInfo').textContent = `Página ${currentPage} de ${totalPages || 1}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
        }

        function changePage(direction) {
            const totalPages = Math.ceil(filteredLeads.length / leadsPerPage);
            if (direction === 'next' && currentPage < totalPages) {
                currentPage++;
            } else if (direction === 'prev' && currentPage > 1) {
                currentPage--;
            }
            renderLeadsTable();
        }

        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            applyFiltersAndSort();
        }

        function renderLeadsChart() {
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 6); // Last 7 days including today

            const dailyLeads = {};
            for (let i = 0; i < 7; i++) {
                const d = new Date(sevenDaysAgo);
                d.setDate(sevenDaysAgo.getDate() + i);
                dailyLeads[d.toISOString().split('T')[0]] = 0;
            }

            allLeads.forEach(lead => {
                const leadDate = lead.created_at.split('T')[0];
                if (dailyLeads.hasOwnProperty(leadDate)) {
                    dailyLeads[leadDate]++;
                }
            });

            const labels = Object.keys(dailyLeads).map(dateString => {
                const [year, month, day] = dateString.split('-');
                return `${day}/${month}`;
            });
            const data = Object.values(dailyLeads);

            const ctx = document.getElementById('leadsChart').getContext('2d');

            if (leadsChartInstance) {
                leadsChartInstance.destroy();
            }

            leadsChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Leads por Día',
                        data: data,
                        backgroundColor: 'rgba(245, 158, 11, 0.2)',
                        borderColor: '#f59e0b',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false,
                        },
                        title: {
                            display: true,
                            text: 'Leads Creados Últimos 7 Días',
                            color: var(--text-color)
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: var(--border-color),
                            },
                            ticks: {
                                color: var(--secondary-text-color)
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: var(--border-color),
                            },
                            ticks: {
                                color: var(--secondary-text-color),
                                precision: 0
                            }
                        }
                    }
                }
            });
        }

        function renderNotifications(notifications) {
            const notificationsList = document.getElementById('notificationsList');
            notificationsList.innerHTML = '';
            notifications.forEach(notification => {
                const date = new Date(notification.created_at).toLocaleString();
                notificationsList.innerHTML += `
                    <div class="notification-item">
                        <div class="notification-title">${notification.title}</div>
                        <div class="notification-message">${notification.message}</div>
                        <div class="notification-date">${date}</div>
                    </div>
                `;
            });
        }

        function openLeadDetail(lead) {
            selectedLeadId = lead.id;
            document.getElementById('detailId').textContent = lead.id;
            document.getElementById('detailName').value = lead.name;
            document.getElementById('detailEmail').value = lead.email;
            document.getElementById('detailPhone').value = lead.phone || 'N/A';
            document.getElementById('detailCourseInterest').value = lead.course_interest || 'N/A';
            document.getElementById('detailPreferredSchedule').value = lead.preferred_schedule || 'N/A';
            document.getElementById('detailSource').textContent = lead.source || 'N/A';
            document.getElementById('detailStatus').value = lead.status;
            document.getElementById('detailWhatsappId').value = lead.whatsapp_id || 'N/A';
            document.getElementById('detailNotes').value = lead.notes || '';
            document.getElementById('detailCreatedAt').textContent = new Date(lead.created_at).toLocaleString();
            document.getElementById('detailUpdatedAt').textContent = new Date(lead.updated_at).toLocaleString();

            document.getElementById('leadDetailSidebar').classList.add('open');
            document.getElementById('dashboardContainer').classList.add('sidebar-open');
        }

        function closeLeadDetail() {
            selectedLeadId = null;
            document.getElementById('leadDetailSidebar').classList.remove('open');
            document.getElementById('dashboardContainer').classList.remove('sidebar-open');
        }

        async function updateLeadStatus() {
            if (!selectedLeadId) return;

            const newStatus = document.getElementById('detailStatus').value;
            const updated_at = new Date().toISOString();

            try {
                await supabaseFetch.patch('leads', selectedLeadId, { status: newStatus, updated_at: updated_at });
                console.log('Lead status updated successfully');
                document.getElementById('detailPanel').classList.add('hidden');
                await fetchLeads();
            } catch (error) {
                console.error('Error updating lead status:', error.message);
                alert('Error al actualizar el estado del lead.');
            }
            }

            if (data && data.length > 0) {
                alert('Estado del lead actualizado con éxito.');
                // Update the lead in our local allLeads array
                const index = allLeads.findIndex(lead => lead.id === selectedLeadId);
                if (index !== -1) {
                    allLeads[index] = { ...allLeads[index], status: newStatus, updated_at: updated_at };
                }
                applyFiltersAndSort(); // Re-render table and update stats
                closeLeadDetail();
            }
        }

        function exportCsv() {
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "ID,Nombre,Email,Teléfono,Interés Curso,Horario Preferido,Origen,Estado,WhatsApp ID,Notas,Fecha Creación,Fecha Actualización\n";

            filteredLeads.forEach(lead => {
                const row = [
                    lead.id,
                    `"${lead.name}"`,
                    `"${lead.email}"`,
                    `"${lead.phone || ''}"`,
                    `"${lead.course_interest || ''}"`,
                    `"${lead.preferred_schedule || ''}"`,
                    `"${lead.source || ''}"`,
                    `"${leadStatusMap[lead.status] || lead.status}"`,
                    `"${lead.whatsapp_id || ''}"`,
                    `"${(lead.notes || '').replace(/\n/g, ' ').replace(/"/g, '""')}"`, // Handle newlines and quotes
                    `"${new Date(lead.created_at).toLocaleString()}"`,
                    `"${new Date(lead.updated_at).toLocaleString()}"`
                ];
                csvContent += row.join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "leads-generaia.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }


        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            setInterval(fetchData, 10000); // Auto-refresh every 10 seconds

            document.getElementById('searchInput').addEventListener('input', () => {
                currentPage = 1; // Reset to first page on search
                applyFiltersAndSort();
            });
            document.getElementById('statusFilter').addEventListener('change', () => {
                currentPage = 1; // Reset to first page on filter change
                applyFiltersAndSort();
            });
            document.getElementById('prevPage').addEventListener('click', () => changePage('prev'));
            document.getElementById('nextPage').addEventListener('click', () => changePage('next'));
            document.getElementById('leadsTableBody').addEventListener('click', (event) => {
                const row = event.target.closest('tr');
                if (row && row.dataset.leadId) {
                    const lead = allLeads.find(l => l.id == row.dataset.leadId);
                    if (lead) openLeadDetail(lead);
                }
            });
            document.querySelectorAll('.leads-table th[data-sort]').forEach(header => {
                header.addEventListener('click', () => sortTable(header.dataset.sort));
            });
            document.getElementById('closeSidebarButton').addEventListener('click', closeLeadDetail);
            document.getElementById('updateStatusButton').addEventListener('click', updateLeadStatus);
            document.getElementById('exportCsvButton').addEventListener('click', exportCsv);
        });

        function updateDashboard() {
            updateStats();
            renderLeadsTable();
            renderLeadsChart();
            // Notifications are rendered directly in fetchNotifications
        }

        // Global Chart.js defaults for dark theme
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#334155';

    </script>
</body>
</html>
