events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Upstream for Supabase API
    upstream supabase_api {
        server supabasekong-p8h4nk7kodh8ddk349s5px8b.app.generaia.org:443;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API calls to Supabase
        location /api/ {
            resolver 127.0.0.11 valid=30s;
            proxy_pass https://supabasekong-p8h4nk7kodh8ddk349s5px8b.app.generaia.org/;
            proxy_ssl_server_name on;
            proxy_set_header Host supabasekong-p8h4nk7kodh8ddk349s5px8b.app.generaia.org;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
        }

        location / {
            try_files $uri $uri/ /index.html =404;
        }
    }
}
